---
version: 2
plan:
  project-key: AJL
  key: SCRIPTLETSTEST
  name: scriptlets - test new
variables:
  dockerPuppeteer: adguard/puppeteer-runner:22.14--24.5--1

stages:
  - Setup: &stage
      manual: false
      final: false
      jobs:
        - Setup dependencies
  - Build:
      <<: *stage
      jobs:
        - Build docs
        - Build lib
  - Lint and test:
      <<: *stage
      jobs:
        - Test qunit
        - Test vitest
        - Test smoke
        # lint should be run after building of docs and lib
        - Lint

Setup dependencies:
  key: SETUP
  docker: &docker
    image: "${bamboo.dockerPuppeteer}"
    volumes:
      ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            ls -laht

            # Fix mixed logs
            exec 2>&1

            # Exclude '--ignore-scripts' from pnpm arguments
            # since it prevents postinstall scripts from running
            # so Chrome is not installed which is crucial for tests
            originalPnpmArgs="$bamboo_varsPnpm"
            modifiedPnpmArgs=$(echo "$originalPnpmArgs" | sed 's/--ignore-scripts//g')

            # Set cache directory
            pnpm config set store-dir ${bamboo.cachePnpm}

            # Install dependencies once with optimization flags
            pnpm install --frozen-lockfile --prefer-offline ${modifiedPnpmArgs}
  artifacts:
    - name: node_modules
      location: .
      pattern: node_modules/**
      shared: true
      required: true
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh node_modules"
  requirements: &requirements
    - extension: 'true'

Build docs:
  key: BUILDDOCS
  docker:
    image: "${bamboo.dockerPuppeteer}"
    volumes:
      ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout:
        force-clean-build: true
    - artifact-download:
        artifacts:
          - name: node_modules
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            # Fix mixed logs
            exec 2>&1

            # build docs to lint them later
            # check compatibility table updates and build it and build wiki docs
            pnpm wiki
  final-tasks:
    - script: &cleanup-script
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh"
  requirements: &requirements
    - extension: 'true'

Build lib:
  key: BUILDLIB
  docker:
    image: "${bamboo.dockerPuppeteer}"
    volumes:
      ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout:
        force-clean-build: true
    - artifact-download:
        artifacts:
          - name: node_modules
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            # Fix mixed logs
            exec 2>&1

            pnpm build
  artifacts:
    - name: scriptlets.corelibs.json
      location: dist
      pattern: scriptlets.corelibs.json
      required: true
    - name: redirects.json
      location: dist
      pattern: redirects.json
      required: true
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh dist/scriptlets.corelibs.json,dist/redirects.json"
  requirements: *requirements

Test qunit:
  key: TESTQUNIT
  docker:
    image: "${bamboo.dockerPuppeteer}"
    volumes:
      ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout
    - artifact-download:
        artifacts:
          - name: node_modules
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            # Fix mixed logs
            exec 2>&1

            pnpm test:qunit
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

Test vitest:
  key: TESTVITEST
  docker:
    image: "${bamboo.dockerPuppeteer}"
    volumes:
      ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout
    - artifact-download:
        artifacts:
          - name: node_modules
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            # Fix mixed logs
            exec 2>&1

            pnpm test:vitest
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

Test smoke:
  key: TESTSMOKE
  docker:
    image: "${bamboo.dockerPuppeteer}"
    volumes:
      ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout
    - artifact-download:
        artifacts:
          - name: node_modules
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            # Fix mixed logs
            exec 2>&1

            pnpm test:smoke
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

Lint:
  key: LINT
  docker:
    image: "${bamboo.dockerPuppeteer}"
    volumes:
      ${system.PNPM_DIR}: "${bamboo.cachePnpm}"
  tasks:
    - checkout
    - artifact-download:
        artifacts:
          - name: node_modules
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -e
            set -x

            # Fix mixed logs
            exec 2>&1

            pnpm lint
  final-tasks:
    - script: *cleanup-script
  requirements: *requirements

branches:
  create: for-pull-request
  delete:
    after-deleted-days: '1'
    after-inactive-days: '5'
  link-to-jira: true

notifications:
  - events:
      - plan-status-changed
    recipients:
      - webhook:
          name: Build webhook
          url: http://prod.jirahub.service.eu.consul/v1/webhook/bamboo

labels: [ ]
other:
  concurrent-build-plugin: system-default
