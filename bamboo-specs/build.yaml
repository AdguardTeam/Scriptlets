---
version: 2
plan:
  project-key: AJL
  key: SCRIPTLETSBUILD
  name: scriptlets - build

stages:
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex

            # Fix mixed logs
            exec 2>&1

            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg BUILD_RUN_ID=${bamboo.buildNumber} \
              --target full-build-output \
              --output type=local,dest=output \
              .

            # Move artifacts to expected locations for Bamboo
            mv output/artifacts/scriptlets.tgz ./scriptlets.tgz
            mv output/artifacts/build.txt ./build.txt 2>/dev/null || true
    - inject-variables:
        file: build.txt
        scope: RESULT
        namespace: inject
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh scriptlets.tgz"
  artifacts:
    - name: scriptlets.tgz
      location: .
      pattern: scriptlets.tgz
      shared: true
      required: true
  requirements:
    - extension: 'true'

triggers: []

branches:
  create: manually
  delete: never
  link-to-jira: true

labels: []

other:
  concurrent-build-plugin: system-default
